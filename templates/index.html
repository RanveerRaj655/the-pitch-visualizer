<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pitch Visualizer</title>
    <style>
        :root {
            --bg-color: #0a0e1a;
            --accent-color: #f0c040;
            --text-main: #ffffff;
            --text-muted: #a0aabf;
            --card-bg: #141b2d;
            --border-radius: 8px;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .input-section {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
        }

        textarea {
            width: 100%;
            height: 150px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 1rem;
            border-radius: var(--border-radius);
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        select {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 1rem;
            border-radius: var(--border-radius);
            font-size: 1rem;
            flex: 1;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover {
            background-color: #f4d068;
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }

        #loading {
            display: none;
            text-align: center;
            margin: 2rem 0;
            color: var(--accent-color);
        }

        .spinner {
            border: 4px solid rgba(240, 192, 64, 0.2);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #storyboard {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-top: 2rem;
        }

        .panel-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s forwards;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel-header {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            font-weight: 600;
            color: var(--accent-color);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .panel-image {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .panel-caption {
            padding: 1.5rem;
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-main);
        }

        .prompt-toggle {
            padding: 1rem 1.5rem;
            background-color: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.9rem;
            user-select: none;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
        }

        .prompt-toggle:hover {
            color: var(--text-main);
            background-color: rgba(0, 0, 0, 0.3);
        }

        .prompt-content {
            display: none;
            padding: 1.5rem;
            background-color: rgba(0, 0, 0, 0.4);
            font-family: monospace;
            font-size: 0.9rem;
            color: #8fa0c0;
            line-height: 1.5;
        }

        .prompt-content.visible {
            display: block;
        }

        .actions {
            text-align: center;
            margin-top: 3rem;
            display: none;
        }

        @media print {
            body { background-color: #fff; color: #000; }
            .input-section, .actions, .prompt-toggle, .prompt-content { display: none !important; }
            h1 { color: #000; margin-bottom: 1rem; }
            .panel-card { 
                box-shadow: none; 
                border: 1px solid #ccc;
                page-break-inside: avoid;
                margin-bottom: 2rem;
                background-color: #fff;
            }
            .panel-header { color: #000; background-color: #f5f5f5; border-bottom: 1px solid #ccc; }
            .panel-image { border-bottom: 1px solid #ccc; }
            .panel-caption { color: #000; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Pitch Visualizer</h1>
        
        <div class="input-section">
            <textarea id="narrative-text" placeholder="Paste your sales pitch or customer story here..."></textarea>
            <div class="controls">
                <select id="style-select">
                    <option value="cinematic photorealistic">Cinematic Photorealistic</option>
                    <option value="digital art illustration">Digital Art Illustration</option>
                    <option value="watercolor painting">Watercolor Painting</option>
                    <option value="noir black and white">Noir Black and White</option>
                    <option value="corporate flat design">Corporate Flat Design</option>
                </select>
                <button id="generate-btn" onclick="generateStoryboard()">Generate Storyboard</button>
            </div>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <p>Generating your storyboard... (this may take 30–60 seconds)</p>
        </div>

        <div id="storyboard"></div>
        
        <div class="actions" id="actions-panel">
            <button onclick="window.print()">Download Storyboard</button>
        </div>
    </div>

    <script>
        async function generateStoryboard() {
            const text = document.getElementById('narrative-text').value;
            const style = document.getElementById('style-select').value;
            const btn = document.getElementById('generate-btn');
            const loading = document.getElementById('loading');
            const storyboard = document.getElementById('storyboard');
            const actions = document.getElementById('actions-panel');

            if (!text.trim()) {
                alert('Please enter a narrative text first.');
                return;
            }

            btn.disabled = true;
            loading.style.display = 'block';
            storyboard.innerHTML = '';
            actions.style.display = 'none';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, style })
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const panels = await response.json();
                
                panels.forEach((panel, i) => {
                    const card = document.createElement('div');
                    card.className = 'panel-card';
                    card.style.animationDelay = `${i * 0.2}s`;
                    
                    const timestamp = new Date().getTime();
                    card.innerHTML = `
                        <div class="panel-header">Panel ${panel.index}</div>
                        <!-- Fallback ensures UI doesn't break if image isn't found -->
                        <img src="${panel.image_url}?t=${timestamp}" alt="Panel ${panel.index}" class="panel-image" onerror="this.src='/static/panels/panel_${panel.index}.png';">
                        <div class="panel-caption">${panel.scene_text}</div>
                        <div class="prompt-toggle" onclick="togglePrompt(this)">▶ View refined prompt</div>
                        <div class="prompt-content">${panel.refined_prompt}</div>
                    `;
                    
                    storyboard.appendChild(card);
                });

                if (panels.length > 0) {
                    actions.style.display = 'block';
                }
            } catch (error) {
                alert('An error occurred while generating the storyboard. Please try again or check your console.');
                console.error(error);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function togglePrompt(element) {
            const content = element.nextElementSibling;
            const isVisible = content.classList.contains('visible');
            
            if (isVisible) {
                content.classList.remove('visible');
                element.innerText = '▶ View refined prompt';
            } else {
                content.classList.add('visible');
                element.innerText = '▼ Hide refined prompt';
            }
        }
    </script>
</body>
</html>
